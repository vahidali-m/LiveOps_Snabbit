name: live_ops
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^2.30.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.17.0

  # Other packages
  http: ^1.2.1
  provider: ^6.1.2
  fl_chart: ^0.66.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # App icon generator
  flutter_launcher_icons: ^0.13.1

# Launcher icon config
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/appicon.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/